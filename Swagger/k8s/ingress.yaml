apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cinema-api-service
  namespace: api-governance
  labels:
    app: cinema-api-service
spec:
  rules:
    - host: cinema-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cinema-api-service
                port:
                  name: http
