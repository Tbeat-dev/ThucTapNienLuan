apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinema-api-service
  namespace: api-governance
  labels:
    app: cinema-api-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinema-api-service
  template:
    metadata:
      labels:
        app: cinema-api-service
        backstage.io/kubernetes-id: cinema-api-service
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cinema-api
          image: tbeat/cinema-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: WRITE_SWAGGER_FILE
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
